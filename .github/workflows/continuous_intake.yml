name: Full Pipeline (Intake + QC + Features)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run intake
        env:
          PYTHONPATH: .
        run: |
          python src/intake/pubmed_intake.py

      - name: Run QC
        env:
          PYTHONPATH: .
        run: |
          python src/qc/run_qc.py

      - name: Run feature extraction
        env:
          PYTHONPATH: .
        run: |
          python src/extraction/run_feature_extraction.py

      - name: Upload curated outputs to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python - <<EOF
import os
from src.utils.drive_writer import upload_file_to_drive

base = "outputs/curated"

if os.path.exists(base):
    for f in os.listdir(base):
        if f.endswith(".csv") or f.endswith(".json"):
            upload_file_to_drive(
                os.path.join(base, f),
                os.environ["GOOGLE_DRIVE_FOLDER_ID"]
            )
EOF
