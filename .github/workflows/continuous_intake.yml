name: Full Pipeline (Intake → Extraction → Normalize → Append → QC → Features → Audit)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run intake
        env:
          PYTHONPATH: .
        run: |
          python src/intake/pubmed_intake.py

      - name: Extract selected papers
        env:
          PYTHONPATH: .
        run: |
          python src/intake/selected_paper_extraction.py

      - name: Build normalized row-level translation candidates
        env:
          PYTHONPATH: .
        run: |
          python src/extraction/build_translation_rows.py

      - name: Deduplicate and append to master dataset
        env:
          PYTHONPATH: .
        run: |
          python src/extraction/append_translation_rows.py

      - name: Run QC on master dataset
        env:
          PYTHONPATH: .
        run: |
          python src/qc/run_qc.py

      - name: Run feature extraction on PASS dataset
        env:
          PYTHONPATH: .
        run: |
          python src/extraction/run_feature_extraction.py

      - name: Build audit manifest
        env:
          PYTHONPATH: .
        run: |
          python src/utils/create_audit_manifest.py

      - name: Upload outputs to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          python - <<EOF
import os
from src.utils.drive_writer import upload_file_to_drive

targets = [
    "outputs/collection/literature_registry/pubmed_paper_registry_v1.csv",
    "outputs/collection/literature_registry/pubmed_paper_screening_v1.csv",
    "outputs/collection/literature_extraction/selected_paper_extraction_v1.csv",
    "outputs/collection/translation_row_candidates_v1.csv",
    "outputs/collection/translation_row_master_v1.csv",
    "outputs/collection/translation_row_duplicates_v1.csv",
    "outputs/collection/translation_row_append_summary_v1.json",
    "outputs/curated/translation_dataset_qc_v1.csv",
    "outputs/curated/translation_dataset_pass_v1.csv",
    "outputs/curated/translation_dataset_review_v1.csv",
    "outputs/curated/translation_dataset_fail_v1.csv",
    "outputs/curated/translation_features_v1.csv",
    "outputs/curated/translation_dataset_qc_summary_v1.json",
]

for path in targets:
    if os.path.exists(path):
        upload_file_to_drive(path, os.environ["GOOGLE_DRIVE_FOLDER_ID"])

runs_dir = "outputs/runs"
if os.path.exists(runs_dir):
    for run_name in os.listdir(runs_dir):
        run_path = os.path.join(runs_dir, run_name)
        manifest_path = os.path.join(run_path, "run_manifest_v1.json")
        if os.path.exists(manifest_path):
            upload_file_to_drive(manifest_path, os.environ["GOOGLE_DRIVE_FOLDER_ID"])
EOF
