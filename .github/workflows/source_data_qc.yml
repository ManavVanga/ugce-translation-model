name: Source Data QC

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source-qc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: |
          git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pandas numpy openpyxl

      - name: Show raw source folders
        run: |
          echo "GDSC raw files:"
          find data_sources/gdsc/raw -maxdepth 1 -type f -print | sort || true

          echo "DepMap raw files:"
          find data_sources/depmap_ccle/raw -maxdepth 1 -type f -print | sort || true

      - name: Run GDSC normalization
        env:
          PYTHONPATH: .
        run: |
          python src/normalize/gdsc_normalize.py

      - name: Verify normalized GDSC file
        run: |
          test -f outputs/processed/gdsc/gdsc_iviv_normalized_v1.csv
          echo "Normalized GDSC file exists."
          ls -lh outputs/processed/gdsc/

      - name: Run GDSC source-level QC
        env:
          PYTHONPATH: .
        run: |
          python scripts/qc/run_gdsc_qc.py

      - name: Verify GDSC QC outputs
        run: |
          test -f outputs/qc/gdsc/GDSC_QC_v1/gdsc_qc_full_v1.csv
          test -f outputs/qc/gdsc/GDSC_QC_v1/gdsc_pass_training_grade_v1.csv
          test -f outputs/qc/gdsc/GDSC_QC_v1/gdsc_review_v1.csv
          test -f outputs/qc/gdsc/GDSC_QC_v1/gdsc_fail_v1.csv
          test -f outputs/qc/gdsc/GDSC_QC_v1/gdsc_qc_summary_v1.json
          test -f outputs/training_ready/gdsc/gdsc_pass_training_grade_v1.csv
          echo "GDSC QC outputs verified."
          cat outputs/qc/gdsc/GDSC_QC_v1/gdsc_qc_summary_v1.json

      - name: Run DepMap structural source QC
        env:
          PYTHONPATH: .
        run: |
          python scripts/qc/run_depmap_qc.py

      - name: Verify DepMap QC outputs
        run: |
          test -f outputs/qc/depmap_ccle/DepMap_QC_v1/depmap_qc_file_summary_v1.csv
          test -f outputs/qc/depmap_ccle/DepMap_QC_v1/depmap_qc_summary_v1.json
          echo "DepMap QC outputs verified."
          cat outputs/qc/depmap_ccle/DepMap_QC_v1/depmap_qc_summary_v1.json

      - name: Track source QC outputs with Git LFS
        run: |
          git lfs install

          git lfs track "data_sources/**/*.csv"
          git lfs track "outputs/**/*.csv"
          git lfs track "outputs/**/*.json"

          git add .gitattributes

      - name: Commit source QC outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .gitattributes
          git add outputs/processed/gdsc/
          git add outputs/qc/gdsc/GDSC_QC_v1/
          git add outputs/training_ready/gdsc/
          git add outputs/qc/depmap_ccle/DepMap_QC_v1/

          if git diff --cached --quiet; then
            echo "No source QC changes to commit."
          else
            git commit -m "Run GDSC and DepMap source QC"
            git push
          fi

      - name: Upload source QC artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-qc-outputs
          path: |
            outputs/processed/gdsc/
            outputs/qc/gdsc/GDSC_QC_v1/
            outputs/training_ready/gdsc/
            outputs/qc/depmap_ccle/DepMap_QC_v1/
