      - name: Commit source QC outputs with Git LFS
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git lfs install

          git lfs track "outputs/processed/gdsc/*.csv"
          git lfs track "outputs/qc/gdsc/GDSC_QC_v1/*.csv"
          git lfs track "outputs/training_ready/gdsc/*.csv"

          git add .gitattributes
          git add outputs/processed/gdsc/
          git add outputs/qc/gdsc/GDSC_QC_v1/
          git add outputs/training_ready/gdsc/

          if git diff --cached --quiet; then
            echo "No source QC changes to commit."
          else
            git commit -m "Run GDSC normalization and source QC with LFS outputs"
            git push
          fi
